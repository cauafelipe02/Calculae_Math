<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" sizes="128x128" href="./assets/imagens/favicon.png">
    <title>Calculaê</title> 
    <link rel="stylesheet" href="./main.css">
</head>
<body>
    <main class="app-container">
        <section id="professor-area">
            <figure id="professor-sprite" class="pose-inicial"></figure>
            <article class="balao-dialogo" id="balao-fala-professor">
                <p id="fala-professor">Olá! Sou o Professor Girafales. Vamos aplicar a matemática hoje?</p>
            </article>
        </section>

        <section id="interacao-area">
            <nav id="menu-opcoes" class="menu-opcoes-style">
                <button onclick="mudarCena('booleana')">Álgebra Booleana</button>
                <button onclick="mudarCena('teoriaConjunto')">Teoria de Conjuntos</button>
                <button onclick="mudarCena('funcoesMatematicas')">Funções matemáticas</button>
                <button onclick="mudarCena('calculo')">Resolver Expressão</button>  
            </nav>

            <form id="form-calculo" class="escondido">
                <article id="resumo-teoria" class="estilizacao-texto"></article>
                <div id="inputs-dinamicos" class="inputs-dinamicos-style"></div>
                <output id="resultado-matematico"></output>
                <button type="button" class="btn-voltar" onclick="resetar()">Voltar ao início</button>
            </form>
        </section>
    </main>
    <script type="module" src="./assets/js_pages/main.js"></script>
</body>
</html>
